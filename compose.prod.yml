services:
  server:
    image: ${DOCKERHUB_USERNAME}/mfp-server:latest
    networks:
      - app
      - web
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: supersecret
      DB_NAME: postgres
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mfp-server.rule=Host(`api.swarm.localhost`)"
        - "traefik.http.routers.mfp-server.entrypoints=web"
        - "traefik.http.services.mfp-server.loadbalancer.server.port=3000"

  db:
    image: postgres:17-alpine
    networks:
      - app
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  app:
    driver: overlay
  web:
    external: true

volumes:
  pgdata:
