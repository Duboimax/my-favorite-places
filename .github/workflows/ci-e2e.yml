name: ci-e2e

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install server dependencies
        run: npm install
        working-directory: ./server

      - name: Build server
        run: npm run build
        working-directory: ./server

      - name: Start server
        run: node dist/index.js &
        working-directory: ./server
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASSWORD: supersecret
          DB_NAME: postgres

      - name: Install client dependencies
        run: npm install
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client

      - name: Start client
        run: npm run preview &
        working-directory: ./client

      - name: Wait for services
        run: npx wait-on tcp:localhost:3000 http://localhost:4173 --timeout 30000

      - name: Run Cypress tests
        run: npm run test:e2e
        working-directory: ./client
